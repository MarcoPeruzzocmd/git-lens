services:
  db:
    container_name: mysql_gitlens
    image: mysql:8.0
    restart: always
    ports:
      - "3306:3306"
    env_file: ./backend/.env
    volumes:
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
      - db_data:/var/lib/mysql

  php:
    container_name: php_gitlens
    build: ./backend
    env_file: ./backend/.env
    ports:
      - "80:80"
    volumes:
      - ./backend:/var/www/html
    depends_on:
      - db

  node:
    container_name: node_gitlens
    build: ./frontend
    ports:
      - "5173:5173"
    working_dir: /app
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - HOST=0.0.0.0

volumes:
  db_data:
